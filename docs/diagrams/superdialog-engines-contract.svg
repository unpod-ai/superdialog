  <path d="M836 532 V580" class="flow cyan " stroke="#00d8e8" marker-end="url(#arrow-cyan)"/>
  <path d="M704 672 C704 720 572 720 520 748" class="flow cyan " stroke="#00d8e8" marker-end="url(#arrow-cyan)"/>
  <path d="M968 672 C968 720 1100 720 1152 748" class="flow purple " stroke="#8d75ff" marker-end="url(#arrow-purple)"/>
  <path d="M444 852 V862" class="flow cyan " stroke="#00d8e8" />
  <path d="M1228 852 V862" class="flow purple " stroke="#8d75ff" />

