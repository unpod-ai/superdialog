<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-label="SUPERDIALOG TEXT LOOP">
  <defs>
    <pattern id="hatch" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="16" stroke="#1a1d22" stroke-width="3" opacity="0.7"/>
    </pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8d75ff"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d8e8"/>
    </marker>
    <style>
      svg { background: #020303; }
      .title { font: 700 44px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #f0f0f0; letter-spacing: 9px; }
      .label { font: 700 22px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #f0f0f0; letter-spacing: 3px; }
      .small { font: 700 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #a8abb4; letter-spacing: 2px; }
      .tiny { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #a8abb4; letter-spacing: 1px; }
      .panel { fill: url(#hatch); stroke: #4a4d55; stroke-width: 2; }
      .box { fill: #020303; stroke: #4a4d55; stroke-width: 2.5; }
      .purple { stroke: #8d75ff; }
      .cyan { stroke: #00d8e8; }
      .purpleText { fill: #8d75ff; }
      .cyanText { fill: #00d8e8; }
      .flow { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 14 22; animation: dash 1.8s linear infinite; }
      .flow.fast { animation-duration: 1.35s; }
      .flow.slow { animation-duration: 2.4s; }
      .dim { opacity: 0.72; }
      .pulse { filter: url(#glow); animation: pulse 1.7s ease-in-out infinite; transform-origin: center; }
      @keyframes dash { to { stroke-dashoffset: -36; } }
      @keyframes pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        .flow, .pulse { animation: none; }
      }
    </style>
  </defs>
  <rect width="1672" height="941" fill="#020303"/>
  <text x="836" y="70" text-anchor="middle" class="title">SUPERDIALOG TEXT LOOP</text>
  
  <rect x="152" y="356" width="290" height="150" rx="16" class="box purple "/>
  <text x="297" y="439" text-anchor="middle" class="label">
    <tspan x="297" dy="0">USER TEXT</tspan>
  </text>
  <rect x="602" y="250" width="468" height="360" rx="18" class="panel cyan"/>
  <text x="836" y="294" text-anchor="middle" class="label cyanText">
    <tspan x="836" dy="0">AGENT PROTOCOL</tspan>
  </text>
  <rect x="664" y="344" width="344" height="94" rx="16" class="box cyan "/>
  <text x="836" y="399" text-anchor="middle" class="label">
    <tspan x="836" dy="0">AGENT.TURN</tspan>
  </text>
  <rect x="664" y="470" width="158" height="62" rx="12" class="box cyan"/>
  <text x="743" y="507" text-anchor="middle" class="small">
    <tspan x="743" dy="0">TOOLS</tspan>
  </text>
  <rect x="850" y="470" width="158" height="62" rx="12" class="box cyan"/>
  <text x="929" y="507" text-anchor="middle" class="small">
    <tspan x="929" dy="0">STATE</tspan>
  </text>
  <rect x="1230" y="356" width="290" height="150" rx="16" class="box purple "/>
  <text x="1375" y="439" text-anchor="middle" class="label">
    <tspan x="1375" dy="0">REPLY TEXT</tspan>
  </text>
  <path d="M442 431 H592" class="flow cyan " stroke="#00d8e8" marker-end="url(#arrow-cyan)"/>
  <path d="M1070 431 H1220" class="flow cyan " stroke="#00d8e8" marker-end="url(#arrow-cyan)"/>

</svg>
