version: "3"

vars:
  UV:
    sh: command -v uv 2>/dev/null || echo "${HOME}/.local/bin/uv"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # --- Setup ---

  install:
    desc: Alias for sync (install all deps)
    deps: [sync]

  sync:
    desc: Sync all deps via uv
    cmds:
      - "{{.UV}} sync"

  # --- Code Quality ---

  lint:
    desc: Run ruff linter
    cmds:
      - "{{.UV}} run --extra dev ruff check ."

  lint-fix:
    desc: Run ruff linter with auto-fix
    cmds:
      - "{{.UV}} run --extra dev ruff check . --fix"

  format:
    desc: Run ruff formatter
    cmds:
      - "{{.UV}} run --extra dev ruff format ."

  format-check:
    desc: Check formatting without applying changes
    cmds:
      - "{{.UV}} run --extra dev ruff format . --check"

  typecheck:
    desc: Run pyrefly type checker
    cmds:
      - "{{.UV}} run --extra dev pyrefly check"

  check:
    desc: Run lint + format-check + typecheck
    cmds:
      - task: lint
      - task: format-check
      - task: typecheck

  # --- Tests ---

  test:
    desc: Run the test suite
    cmds:
      - "{{.UV}} run --extra dev pytest tests/ -v"

  test-cov:
    desc: Run tests with coverage report
    cmds:
      - "{{.UV}} run --extra dev pytest tests/ -v --cov=src/superdialog --cov-report=term-missing"
