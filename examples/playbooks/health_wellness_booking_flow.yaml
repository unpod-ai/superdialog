        \ 2–3 years, Tablets 2–3 years. Store in cool, dry place away from direct sunlight.\nQ. Time to\
        \ show results? Depends on product and purpose. Preventive products may show response in a few\
        \ weeks; treatment-focused may take longer with regular use.\nQ. International shipping? Yes —\
        \ depends on destination regulations. International: variable cost, 10–15 business days delivery,\
        \ tracking provided.\nQ. Return / refund policy? Post-shipment 7-day returns if unopened; opened\
        \ products typically considered only if defective.\nQ. Side effects? Generally well tolerated.\
        \ Anyone with allergies, medical condition, or ongoing medication should consult a qualified healthcare\
        \ professional first.\n\n============================================================\nSECTION\
        \ C — ORDERS & TELEMEDICINE\n============================================================\n\n\
        Q. How to order? Website, WhatsApp, or phone. Provide product names/codes, quantity, delivery\
        \ address. Invoice via email. Payment: card, UPI, bank transfer, COD (depends on region).\nQ.\
        \ Shipping & delivery? India: free above six hundred ninety-nine rupees (else one hundred to three\
        \ hundred rupees), 3–5 business days. International: variable, 10–15 business days.\nQ. Cancel/modify\
        \ order? Within 2 hours if not yet packed/dispatched.\nQ. Bulk/wholesale? Yes — special pricing\
        \ for ten plus units. Wholesale for pharmacies, clinics, retailers. Custom quotes available.\n\
        Q. Telemedicine consultation? Via WhatsApp/video/phone. 30–45 minutes. Share symptoms and medical\
        \ history. Doctor recommends treatments/products.\nQ. How to book consultation? WhatsApp, website,\
        \ or phone. Provide preferred date/time. Confirmation and link sent.\nQ. Pre-consultation prep?\
        \ Prepare symptom description, duration, current medications, medical history, dietary habits.\
        \ Share recent test reports if available.\n\n============================================================\n\
        SECTION D — KAIRALI HEALING VILLAGE (KERALA)\n============================================================\n\
        \nQ. What is The Ayurvedic Healing Village? Kairali''s flagship sixty-five-acre wellness retreat\
        \ luxury residential facility in Kerala, for doctor-supervised therapeutic Ayurvedic treatment\
        \ and rejuvenation, preventive, and wellness programs.\nQ. What programs? Treatment programs for\
        \ chronic conditions, preventive and rejuvenation programs, yoga-based wellness retreats.\nQ.\
        \ Duration? Depends on condition and doctor''s assessment — usually around 7 to 21 days. (Per\
        \ [Non-Negotiable Rules], if asked specifics, say team will share details.)\nQ. Pricing? Treatment\
        \ programs generally start from twenty thousand four hundred ninety-five rupees per night single\
        \ occupancy and thirty-seven thousand nine hundred rupees per night double occupancy. Preventive:\
        \ sixteen thousand two hundred sixty-four single, twenty-nine thousand four hundred thirty-nine\
        \ double per night. Final quotes shared by team.\nQ. Accommodation? Categories may include Deluxe,\
        \ Classic, Royal, and Suite (always called VILLAS, never cottages).\nQ. Included? Accommodation,\
        \ doctor consultation, prescribed therapies, Ayurvedic meals, yoga sessions where applicable.\n\
        Q. Check-in/check-out? Check-in around 12 noon on first day (airport pickup available); check-out\
        \ around 10 AM on last day.\nQ. Couple/family/group bookings? Yes, individual, couple, family,\
        \ group — depending on program.\nQ. Follow-up post-treatment? Complimentary consultations for\
        \ 3 months post-treatment. Home-care guidance and dietary recommendations may be provided.\nQ.\
        \ Results guaranteed? NO. Outcomes vary by individual condition, constitution, and adherence.\n\
        \n============================================================\nSECTION E — VILLA RAAG (GOA)\n\
        ============================================================\n\nQ. What is Villa Raag? Kairali''s\
        \ ultra-premium private wellness villa on Agonda Beach in Goa.\nQ. What''s included? Accommodation,\
        \ selected meal plans, private heated saltwater pool access, private theatre, terrace barbeque\
        \ area, dedicated service support.\nQ. Rooms? 6 rooms total — 4 Serenity Suites and 2 Harmony\
        \ Haven rooms.\nQ. Entire villa booking? Yes — for families, private gatherings, corporate retreats,\
        \ subject to availability.\nQ. Pets? May be allowed depending on prior approval and villa guidelines.\n\
        Q. Pricing? Programs generally start from thirty-four thousand six hundred ninety-two rupees per\
        \ night single, and forty thousand four hundred seventy-four rupees per night double. Final quotes\
        \ shared by team.\nQ. Travel/visa? Ayurvedic Visa support for international patients. Airport\
        \ transfers available.\n\n============================================================\nSECTION\
        \ F — TREATMENT CENTRES & THERAPIES\n============================================================\n\
        \nQ. Difference between Healing Village, Villa Raag, Treatment Centres?\n  • Healing Village =\
        \ residential luxury retreat in Kerala.\n  • Villa Raag = luxury wellness villa in Goa.\n  • Treatment\
        \ Centers = clinic-based non-residential locations across India for consultation and therapy.\n\
        Q. Therapies offered? Panchakarma therapies, single therapies (massages, oils, herbal applications),\
        \ doctor consultations, specialized plans for joint/skin/digestive/stress conditions.\nQ. Treatment\
        \ cost? Single therapies start around one thousand to four thousand rupees per session. Full packages\
        \ vary by location and duration.\nQ. Doctor consultation required? Yes — before therapy.\n\n============================================================\n\
        SECTION G/H — TRAINING\n============================================================\n\nQ. Programs?\
        \ Ayurveda, Yoga, Panchkarma certification. Ministry of AYUSH recognized. 20,000+ trained globally.\n\
        Q. Course types?\n  • OAP (One Day) — Ayurveda Bodha — 1 night intro workshop\n  • TAP (Three-Day)\
        \ — Ayurveda Sadhana — 3 nights immersive\n  • WAP (One Week) — Praveena — 5 nights professional\
        \ skills, 5 core therapies\n  • AALC-1 — 2 weeks (10 days) — anatomy, 6 therapies, basic consultation\n\
        \  • AALC-2 — 4 weeks (20 days) — Panchakarma, herbology, Prakriti, lifestyle\nQ. Fees? Short\
        \ courses start from eighteen thousand four hundred ten rupees per person per day. Detailed info\
        \ shared by expert.\nQ. Career outcomes? Graduates work in wellness centers, spas, hospitals globally.\
        \ Internationally accredited.\n\n============================================================\n\
        SECTION I — FRANCHISE / PARTNERSHIP / B2B\n============================================================\n\
        \nQ. Franchise available? Yes — for eligible applicants, subject to internal evaluation.\nQ. Models?\
        \ Treatment centre franchise, product distribution, selected business partnerships.\nQ. Support?\
        \ Training, product supply, branding, marketing material, SOP guidance, operational support, periodic\
        \ reviews.\nQ. ROI guaranteed? NO — business results depend on model, market conditions, execution.\n\
        Q. Franchise investment? Discussed by relevant expert team based on model, location, business\
        \ requirement.\nQ. B2B partnerships? Yes — wellness workshops, retreat packages, employee wellness,\
        \ bulk products, training support.\nQ. International expansion? Operations in 11 countries. Growth\
        \ regions: USA, UK, GCC, Australia, Europe.\nQ. Sustainability/CSR? Organic in-house farms (65-acre\
        \ pesticide-free), water conservation, solar energy, zero plastic. CSR community programs and\
        \ rural medical camps.\nQ. Research? 100K+ patient case documentation, partnerships with research\
        \ institutions, CME programs.\nQ. Insurance partnerships? Available with selected partners. Documents\
        \ provided for reimbursement.\n\n============================================================\n\
        SECTION J — CAREERS\n============================================================\n\nQ. How to\
        \ apply? Email CV to career@kairali.com (read as 'career at kairali dot com').\nQ. Hiring? Depends\
        \ on role and availability. Common openings: therapists, Ayurvedic doctors, yoga instructors,\
        \ admin, sales.\nQ. Qualifications? Therapists need recognized Ayurvedic/Panchakarma certification.\
        \ Doctors need BAMS degree with valid registration. Other roles per job description.\n\n============================================================\n\
        SECTION K — PRIVACY / COMPLAINTS\n============================================================\n\
        \nQ. How is customer data handled? Used only for enquiry and service-related assistance, processed\
        \ per applicable data protection practices.\nQ. Data deletion request? Yes — submit through official\
        \ channels, handled per applicable process and law.\nQ. Raise complaint? Through official communication\
        \ channels — relevant department reviews per policy.\nQ. Refunds guaranteed? NO — each case reviewed\
        \ individually per applicable booking or product policy.\nQ. Health-related discussions disclaimer:\
        \ 'I am an assistant, not a licensed medical professional, and I do not diagnose, treat, or provide\
        \ medical advice.'\n\n============================================================\nSECTION L\
        \ — OPERATING HOURS BY LOCATION\n============================================================\n\
        \nTreatment Centres:\n  • Mehrauli, New Delhi: 7 AM–8 PM, closed Tuesday\n  • Sirifort, New Delhi:\
        \ 7 AM–8 PM, closed Monday\n  • Gurugram, Haryana: 7 AM–8 PM, closed Tuesday\n  • Patna, Bihar:\
        \ 10 AM–7 PM, closed Monday\n  • Vadodara, Gujarat: 10 AM–8 PM, closed Sunday\n  • Raipur, Chhattisgarh:\
        \ 7 AM–7 PM, closed Monday\n  • Faridabad, Haryana: 7 AM–8 PM, 7 days open\n  • Guwahati, Assam:\
        \ 10 AM–10 PM, 7 days open\nProducts: Mehrauli + Pollachi 9:30 AM–6:30 PM, closed Sunday.\nVilla\
        \ Raag: Mehrauli office 9:30 AM–6:30 PM (7 days); Agonda Goa 9 AM–9 PM (7 days).\nHealing Village:\
        \ Mehrauli office 9:30 AM–6:30 PM (7 days); Palakkad Kerala 8 AM–9 PM (7 days).\n\n\n============================================================\n\
        SECTION K (ADDITIONAL) — COMPANION, COMPLIANCE & THERAPIST\n============================================================\n\
        \nQ. Can someone accompany the patient at Healing Village?\n[EN] 'Yes, any individual may accompany\
        \ the client and stay in the same villa. An additional charge will apply for the extra bed and\
        \ meals provided to the companion.'\n[HI] 'जी हाँ, कोई भी individual client के साथ same villa\
        \ में रह सकता है। companion के लिए extra bed और meals का additional charge applicable होगा।'\n\
        \nQ. Can I request a specific therapist?\n[EN] 'Preferences can be noted, but a specific therapist\
        \ cannot always be guaranteed.'\n[HI] 'Preference note की जा सकती है, लेकिन specific therapist\
        \ हमेशा guarantee नहीं किया जा सकता।'\n\nQ. Data privacy / DPDPA compliance?\n[EN] 'In compliance\
        \ with India's Digital Personal Data Protection Act (DPDPA) 2023, NABH standards, and international\
        \ privacy regulations such as GDPR/HIPAA — I am here to help you identify suitable wellness programs.\
        \ Any detailed health assessment is conducted only by our licensed physicians in a secure and\
        \ confidential environment. Customer data is used only to support enquiries and processed per\
        \ applicable data protection practices.'\n[HI] 'India के Digital Personal Data Protection Act\
        \ (DPDPA) 2023, NABH standards, और international privacy regulations के अनुसार — मैं यहाँ आपको\
        \ suitable wellness programs identify करने में help करने के लिए हूँ। किसी भी detailed health assessment\
        \ केवल हमारे licensed physicians द्वारा secure और confidential environment में किया जाता है।'\n\
        ============================================================\nROUTING (per [Critical Behavior\
        \ Rules] — never end with 'aur kuch chahiye?'):\n============================================================\n\
        \  • Question answered AND caller has no more questions → fire edge_kb_done (route to lead capture\
        \ if applicable category, else closing).\n  • Caller asks another KB question → fire edge_kb_another\
        \ (stay in this node).\n  • Caller wants to be connected with a team (interested in a specific\
        \ category) → fire edge_kb_to_lead_capture.\n  • Question NOT in KB → fire edge_kb_unknown (route\
        \ to out_of_scope)."
      advance_when:
      - when: Caller has another knowledge-base question.
        to: main.knowledge_base
      - when: Caller is interested in a category — proceed to lead capture.
        to: main.lead_capture_alt_number
      - when: All caller's KB questions answered and they have no more — close.
        to: main.closing
      - when: Question is not in the KB — note requirement and arrange callback.
        to: main.out_of_scope
    - id: out_of_scope
      goal: Edge Case — Out of Scope (Note Requirement + Callback)
      guidance: "Caller asked something outside the script + KB. Per [Response Guidelines]: do NOT guess.\
        \ Note the requirement and arrange the callback.\n\n[EN] 'I''m sorry, I don''t have confirmed\
        \ information on that at the moment. I''ll make a note of your requirement and arrange for the\
        \ concerned team to get back to you with accurate details. Thank you for your patience. Is there\
        \ anything else I can assist you with in the meantime?'\n[HI] 'मुझे खेद है, इस समय मेरे पास इस\
        \ विषय पर पक्की जानकारी उपलब्ध नहीं है। मैं आपकी requirement note कर लेती हूँ और संबंधित team\
        \ से callback arrange करवा दूँगी ताकि आपको सही जानकारी मिल सके। आपके धैर्य के लिए धन्यवाद। क्या\
        \ मैं अभी किसी और चीज़ में आपकी सहायता कर सकती हूँ?'\n<wait for response>\n\nROUTING:\n  • Caller\
        \ has more questions → fire edge_oos_continue (route to knowledge_base for KB-able queries, else\
        \ loop here).\n  • Caller has no more questions → fire edge_oos_to_lead_capture (still capture\
        \ details for the requirement they raised)."
      advance_when:
      - when: Caller has more questions — route to knowledge_base.
        to: main.knowledge_base
      - when: Caller has no more questions — capture contact details for the noted requirement.
        to: main.lead_capture_alt_number
    - id: closing
      goal: Closing — Multi-Variant Goodbye
      guidance: '[EN] ''Thank you for your time today. Our team will get in touch with you soon. Have
        a wonderful day.''

        [HI] ''आज time देने के लिए Thank you. हमारी team जल्द आपसे contact करेगी। Have a wonderful day.'''
      terminal: true
      outcome: closing
    - id: closing_careers
      goal: Closing — Careers
      guidance: '[EN] ''Thank you for your interest. Have a great day.''

        [HI] ''आपके interest के लिए Thank you. Have a great day.'''
      terminal: true
      outcome: closing_careers
    - id: closing_not_interested
      goal: Closing — Not Interested
      guidance: '[EN] ''Thank you for sharing that. I''ll make sure the team gets this feedback. Have
        a good day.''

        [HI] ''Thank you, आपने share किया। मैं ये feedback team तक पहुँचा दूँगी। Have a good day.'''
      terminal: true
      outcome: closing_not_interested
    - id: closing_nobody_enquired
      goal: Closing — Nobody Enquired
      guidance: '[EN] ''I''m sorry for the inconvenience. Thank you for your time.''

        [HI] ''I''m sorry for the inconvenience. आपके time के लिए Thank you.'''
      terminal: true
      outcome: closing_nobody_enquired
    - id: closing_callback
      goal: Closing — Callback Reschedule
      guidance: '[EN] ''Perfect, I''ve noted that down. We''ll reach out at that time. Thank you, and
        have a nice day.''

        [HI] ''ठीक है, मैंने note कर लिया है। हम उसी time पर call कर देंगे। Thank you and have a nice
        day.'''
      terminal: true
      outcome: closing_callback
    - id: closing_already_spoke
      goal: Closing — Already Spoke
      guidance: '[EN] ''Thank you. In that case, I won''t repeat the same discussion. Have a great day.''

        [HI] ''धन्यवाद। फिर मैं वही बात repeat नहीं करूँगी। Have a great day.'''
      terminal: true
      outcome: closing_already_spoke
    - id: closing_wrong_number
      goal: Closing — Wrong Number / Decline
      guidance: '[EN] ''Understood. Thank you for your time. Have a good day.''

        [HI] ''Understood. आपके time के लिए Thank you. Have a good day.'''
      terminal: true
      outcome: closing_wrong_number
    - id: closing_competitor
      goal: Closing — Competitor Inquiry
      guidance: '[EN] ''I''m sorry, I''m only authorized to provide information related to the Kairali
        Ayurvedic Group. I won''t be able to assist with that. Thank you for your time. Have a great day!''

        [HI] ''मुझे खेद है, मैं केवल Kairali Ayurvedic Group से संबंधित जानकारी ही दे सकती हूँ। इस विषय
        में मैं सहायता नहीं कर पाऊँगी। धन्यवाद। आपका दिन शुभ हो!'''
      terminal: true
      outcome: closing_competitor
    - id: closing_off_topic
      goal: Closing — Off Topic
      guidance: '[EN] ''I''m sorry, I''m only equipped to assist with Kairali Ayurvedic Group related
        queries. Since we''re unable to continue on that topic, I''ll have to end this call. If you have
        any query in the future, please don''t hesitate to call us. Thank you for your time today and
        have a great day!''

        [HI] ''मुझे खेद है, मैं केवल Kairali Ayurvedic Group से संबंधित प्रश्नों में ही सहायता करने में
        सक्षम हूँ। इसलिए मुझे यह call समाप्त करनी होगी। यदि भविष्य में आपके पास कोई भी प्रश्न हो, तो कृपया
        बेझिझक हमसे संपर्क करें। आज अपना समय देने के लिए धन्यवाद। आपका दिन शुभ हो!'''
      terminal: true
      outcome: closing_off_topic
    - id: closing_language
      goal: Closing — Language Incompatible
      guidance: '[EN] ''I understand. Thank you for your time. Have a good day.''

        [HI] ''I understand. आपके time के लिए Thank you. Have a good day.'''
      terminal: true
      outcome: closing_language
dispatch:
- intent: '{{inquiry}} matches products/medicine/oil/tablet/skincare keywords.'
  to: main.category_products
- intent: '{{inquiry}} matches order/delivery/tracking keywords.'
  to: main.category_order_delivery
- intent: '{{inquiry}} matches retreat/wellness/rejuvenation/yoga/Kerala keywords.'
  to: main.category_healing_village
- intent: '{{inquiry}} matches Goa/villa/stay/vacation/Agonda keywords.'
  to: main.category_villa_raag
- intent: '{{inquiry}} matches treatment/disease/therapy/consultation/outpatient keywords.'
  to: main.category_treatment_centre
- intent: '{{inquiry}} matches training/course/certification keywords.'
  to: main.category_training
- intent: '{{inquiry}} matches franchise/business/partnership/distributor keywords.'
  to: main.category_franchise
- intent: '{{inquiry}} matches job/career/CV/hiring keywords.'
  to: main.category_careers
- intent: '{{inquiry}} is Kairali-related but not in the predefined categories.'
  to: main.category_other
- intent: '{{inquiry}} is unclear or caller is just exploring.'
  to: main.category_unclear_exploring
interrupts:
- id: global_kb_query
  when: Caller asks any informational question about Kairali Ayurvedic Group, its products, treatments,
    programs, pricing, locations, training, franchise, careers, privacy — anything covered by the knowledge
    base. Used when the question isn't handled by the current node's local edges.
  to: main.knowledge_base
- id: global_not_interested
  when: Caller explicitly says they are not interested in the enquiry / product / service at any point
    in the call. Capture the reason before closing.
  to: main.not_interested
- id: global_did_not_enquire
  when: Caller says they did not make any enquiry / they don't know about Kairali / 'I never called you'
    — must verify before closing whether a family member might have enquired.
  to: main.customer_did_not_enquire
- id: global_callback_reschedule
  when: Caller says it's not a good time / they are busy / wants to be called back later — at any point
    in the call. Capture preferred callback time (must be within Mon–Sat, 9 AM–6 PM).
  to: main.callback_reschedule
- id: global_already_spoke_with_team
  when: Caller says they have already spoken with a Kairali team (KAPPL / KTAHV / Villa Raag / Centres)
    and don't want a repeat discussion.
  to: main.already_spoke
- id: global_out_of_scope
  when: 'Caller asks a question that is NOT in the Kairali knowledge base AND NOT in the script (genuinely
    unknown info). Per [Response Guidelines]: do not guess; note requirement and arrange callback.'
  to: main.out_of_scope
- id: global_wrong_number_or_decline
  when: Caller says this is the wrong number / it's a duplicate / they explicitly refuse to share any
    contact details / they want to end the call immediately without further engagement. Route to closing
    with the appropriate brief goodbye.
  to: main.closing_wrong_number
- id: global_competitor_inquiry
  when: 'Caller asks about a competitor or asks Saanvi to compare Kairali with another brand. Per [Non-Negotiable
    Rules]: never mention competitors. Politely decline and close.'
  to: main.closing_competitor
- id: global_off_topic_or_nonsense
  when: Caller has given irrelevant, nonsense, abusive, or completely off-topic responses repeatedly.
    Two polite warnings have already been issued in earlier turns and the caller continues. End the call
    per [Out-of-Topic Handling Rule].
  to: main.closing_off_topic
- id: global_caller_goodbye
  when: Caller says goodbye, 'that's all', 'no more questions', 'I'm done', 'thank you bye', or otherwise
    signals they want to end the call naturally at any point during the conversation — and it is NOT due
    to being not interested, wrong number, or off-topic behavior.
  to: main.closing
initial: main.greeting
