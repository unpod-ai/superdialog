        \ Check whether current_date, current_preferred_time, and current_booking_players are ALL non-empty.\n\
        \      • If ALL THREE are already set (from any prior turn in the session): they are confirmed\
        \ values. Go to STEP 4 IMMEDIATELY with zero speech — no confirmation question, no 'shall I use\
        \ the same details?'. The caller already provided these values; asking again is a redundant experience.\n\
        \      • If the user explicitly stated NEW date/time/players in their CURRENT turn: use those\
        \ new values and go to STEP 4 directly.\n      • If ANY of current_date, current_preferred_time,\
        \ current_booking_players is empty: ask ONLY for the missing value(s), one at a time, then go\
