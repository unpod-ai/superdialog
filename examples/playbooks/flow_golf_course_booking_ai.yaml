        status\",\"equalto\",\"confirmed\")|list|last|default(results.player_bookings_result.data.bookings|default([])|last|default({}))).course.name|default(\"\
        \")}}.\n\nLAST BOOKING SHORTCUT — If the caller says \"same as last time\", \"same course\", \"\
