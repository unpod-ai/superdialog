        Which city or golf course would you like to play at?\" — accept either a city name OR a course\
        \ name. Then proceed to STEP 2.\n\nSTEP 2 — CONFIRM COURSE.\n  SKIP IF COURSE_ID SET AND VALID:\
        \ If current_course_id is non-empty AND it appears in city_courses for current_city — course already\
        \ committed to platform. Skip to STEP 3 immediately.\n  If current_course_id is non-empty but\
        \ does NOT appear in city_courses for current_city: STALE — the course_id belongs to a previous\
        \ city's booking. This is a CITY CHANGE scenario.\n  (a) Identify the correct course from city_courses\
