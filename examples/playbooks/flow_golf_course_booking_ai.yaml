        \ collect_to_check_availability fires and a slot is selected. If you say any booking-completion\
        \ language without having called collect_to_check_availability, you are hallucinating — STOP and\
        \ call the tool.\nCRITICAL SELF-CHECK — If you notice yourself about to say any of: confirmed,\
        \ payment link, seven minutes, registered email, sent the link, booking is done, complete the\
        \ payment, slot is held — STOP immediately. Those words mean you are hallucinating a booking outcome.\
        \ In this node the ONLY valid outputs are: (1) a question asking for a missing field, or (2) the\
        \ tool call to collect_to_check_availability. Nothing else. Discard any booking-outcome speech\
        \ and call collect_to_check_availability if all fields are known, or ask for the missing field.\n\
        \n\nTIME EXPRESSION MAPPING — when the caller gives a time expression (not a specific clock time),\
        \ derive time_from and time_to:\n  'morning' → time_from=06:00, time_to=12:00\n  'early morning'\
        \ → time_from=05:30, time_to=07:30\n  'afternoon' → time_from=12:00, time_to=17:00\n  'evening'\
        \ → time_from=17:00, time_to=19:30\n  'around [H]' / 'about [H]' / '[H]-ish' → time_from=[H minus\
        \ 15 min], time_to=[H plus 15 min] (e.g. 'around 7' → time_from=06:45, time_to=07:15; preferred_time=07:00)\n\
        \  'after lunch' → time_from=13:00, time_to=15:00\n  Specific clock time (e.g. '7 AM', '09:30')\
        \ → time_from=[that time minus 2 hours, clamped to minimum 06:00], time_to=[that time plus 2 hours,\
        \ clamped to maximum 17:45]\nAlways pass time_from and time_to in collect_to_check_availability\
        \ alongside preferred_time.\nSTEP 4 — All details known (course confirmed in STEP 2, date, preferred_time,\
        \ booking_players all set).\nPRE-STEP-4 TIME VALIDATION — applies even if preferred_time was pre-filled\
        \ from a prior node: convert preferred_time to HH:MM 24h. If STRICTLY BEFORE 06:00 OR STRICTLY\
        \ AFTER 17:45: do NOT call collect_to_check_availability. Say 'The available tee times are from\
        \ 6 AM to 5:45 PM. Could you choose a time in that range?' Clear preferred_time and re-ask. Do\
        \ NOT proceed until a valid time is confirmed.\nIf preferred_time is valid (06:00–17:45): Call\
        \ collect_to_check_availability IMMEDIATELY. Passing course_id is MANDATORY — the availability\
        \ API URL reads from node-local scope first; without it the platform falls back to frozen global\
        \ state (the first booking's course_id) and fires the API for the wrong course.\n\nWHICH course_id\
        \ to pass in STEP 4:\n  • If current_course_id is non-empty AND appears in city_courses for current_city\
        \ — it is valid. Pass current_course_id.\n  • If current_course_id is STALE (non-empty but NOT\
        \ in city_courses for current_city) OR EMPTY — do NOT pass current_course_id. Instead look up\
        \ the course_id in city_courses for the course name the caller just confirmed in this node visit\
        \ (e.g. if caller confirmed 'DLF Golf', find the entry in city_courses whose name matches 'DLF\
        \ Golf and Country Club' and copy its course_id exactly). Pass THAT course_id.\n  • NEVER invent\
        \ a course_id. NEVER pass a course_id not found in city_courses.\n\nZERO speech — no words before\
        \ the tool call. This means: do NOT respond to the user in text, do NOT say anything, do NOT confirm\
        \ the booking in words. Call the tool immediately and silently."
      advance_when:
      - when: course_name is known (caller named a specific course) but course_id is empty — resolve via
