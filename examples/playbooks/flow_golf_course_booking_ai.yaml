        \ PM — confirmed from API). Any time in this range MUST be accepted. Do NOT apply any additional\
        \ restriction from general knowledge. Only reject if preferred_time converts to STRICTLY BEFORE\
        \ 06:00 OR STRICTLY AFTER 17:45 (e.g. 7 PM, 8 PM, 5:30 AM): say \"The available tee times are\
        \ from 6 AM to 5:45 PM. Could you choose a time in that range?\" Do not record the out-of-range\
        \ value. Re-ask until a valid time is given.\n\nBOOKING LANGUAGE PROHIBITION — STRICTLY ENFORCED\
        \ IN THIS NODE.\nYou are in the COLLECTION phase only. You CANNOT say \"booking is confirmed\"\
        , \"total price\", \"payment link\", \"slot is held for\", \"your booking is complete\", or ANY\
        \ other booking-completion language. Do NOT state prices from memory or conversation history.\
