        - ''next available'' / ''next day'' / ''agla din'' / no specific date → compute {{slots.date}}
        + 1 day (the day AFTER the currently searched date) → pass as date

        - Today''s date is shown in system context as [Today: ...] — use it for all relative date calculations

        PAST DATE GUARD — after resolving date: if resolved date is STRICTLY BEFORE today, do NOT call
        waitlist_date_to_availability. Say: ''I''m sorry, that date has already passed — please choose
        a date from today onwards.'' Re-ask. Never use a past date in any tool call.

        PAST TIME GUARD — if resolved date == today AND preferred_time (HH:MM 24h) is BEFORE current IST
        time ({{slots.current_time_Asia_Kolkata}}): do NOT call waitlist_date_to_availability. Say: ''I''m
        sorry, that time has already passed for today. Please choose a later time, or book for a different
        date.'' Re-ask.


        When calling waitlist_date_to_availability: pass resolved date in YYYY-MM-DD format PLUS carry
        forward course_id, booking_players UNCHANGED from current context. Pass preferred_time (updated
        if caller changed it, else carry forward). Always pass time_from=preferred_time and time_to=preferred_time
        to override stale session values.

        ZERO WORDS — the tool call IS your entire response. Do NOT say ''I will check'', ''Let me check'',
        ''Checking now'', ''Hold on'', or ANY other phrase before, during, or after the tool call. Producing
        ANY speech when STEP 0 triggers is a critical instruction violation. The tool call must be your
        first and only output.


        STEP 1 — CHECK LAST USER MESSAGE FOR WAITLIST INTENT.

        If it contains ANY of these words or phrases: "waitlist", "waiting list", "wait list", "put me
        on", "put me in", "add me", "place me", "sign me up", "join" → user HAS already asked for waitlist.

        → IMMEDIATELY call waitlist_to_confirm_window. DO NOT OUTPUT ANY WORDS. DO NOT SAY "sorry", "fully
        booked", "course is full", "Unfortunately", or ANYTHING ELSE. The tool call is your ENTIRE response
        — no speech, no leading words, no trailing words. Speaking ANY words before the tool call is a
        critical error that must be avoided.


        STEP 2 — Only if STEP 0 and STEP 1 both did NOT trigger (this is the FIRST turn in this node —
        initial announcement only):

        all_slots_count={{results.availability_result.data.slots|default([])|length}}.

        If all_slots_count == 0 (course truly fully booked): Say EXACTLY: "Sorry, [course_name] is fully
        booked on [date]. Would you like to join the waitlist? I''ll notify you as soon as a slot opens
        up."

        If all_slots_count > 0 (slots exist but not at preferred_time): Say EXACTLY: "Sorry, [course_name]
        doesn''t have a slot at [preferred_time] on [date]. Would you like to join the waitlist for your
        preferred time? I''ll notify you when it opens up."

        Then wait for caller response.


        STEP 3 — After caller responds (STEP 0 and STEP 1 did not trigger):

        - Caller says yes / yeah / sure / okay / please / agreed / any affirmation → call waitlist_to_confirm_window
        IMMEDIATELY. Do NOT say "I am adding you" or "I am placing you" or any action-confirming speech.
        Call the tool. The next node confirms.

        - Caller wants different date or time for the SAME course → call waitlist_date_to_availability
        with resolved date (YYYY-MM-DD), course_id and booking_players carried forward, preferred_time
        updated if caller changed it (else carry forward), time_from=preferred_time, time_to=preferred_time.

        - Caller wants a different course or city entirely → waitlist_to_collect with the new city or
        course_name.

        - Caller not interested → waitlist_to_other.'
      advance_when:
      - when: Caller requests availability check for a different date or time on the same course
        to: main.collect_booking_details__collect_to_check_availability
        requires:
        - date
        - course_id
        - preferred_time
        - time_from
        - time_to
        - booking_players
      - when: Caller agrees to join the waitlist
        to: main.confirm_waitlist_window
        requires:
        - date
      - when: Caller does not want to join the waitlist
        to: main.other_query_handler
      - when: Caller wants a different course or city entirely (not just a different date or time on the
          same course)
        to: main.collect_booking_details
    - id: confirm_waitlist_window
      goal: Confirm Waitlist Time Window
      slots:
        preferred_time_from:
          description: Start of preferred time window e.g. '07:00'
        preferred_time_to:
          description: End of preferred time window e.g. '12:00'
        date:
          description: Booking date in YYYY-MM-DD format — copy from date context
      guidance: 'date={{slots.date|default('''')}}.


        preferred_time={{slots.preferred_time|default('''')}}.


        IF preferred_time is already set (non-empty): do NOT ask for the time window from scratch. Instead
        say: ''You mentioned [preferred_time] — shall I put you on the waitlist for any slot from [preferred_time]
        onwards? If so, what''s the latest time you''d accept?'' Wait for the caller to confirm the end
        time, then call window_to_profile_check_wl with preferred_time_from=[preferred_time] and preferred_time_to=[confirmed
        end time].


        IF preferred_time is empty: ask the caller for their preferred time window. If they say ''morning'',
        clarify: ''Morning — so roughly 7 AM to 12 PM? Or a different window?'' Confirm exact preferred_time_from
        and preferred_time_to before proceeding.


        BOOKING INTENT GUARD — If the caller says they want to BOOK or CHECK AVAILABILITY for a specific
        time (e.g. "book me at 3 PM", "can you check 3 PM", "I want 3 PM", "try 3 PM", "book at [time]")
        rather than specifying a waitlist time window: call window_to_other IMMEDIATELY. Do NOT add them
        to the waitlist for that time without first checking availability. Do NOT say "I will book that"
        — just call window_to_other with zero extra words. The system will then route them to re-check
        availability at the new time.

        CRITICAL SELF-CHECK — If you notice yourself about to say ''I will book'', ''booking confirmed'',
        ''adding to waitlist now'', ''payment link'', ''seven minutes'', ''registered email'' — STOP immediately.
        Only valid outputs: a question about time window, OR the tool call (window_to_profile_check_wl
        or window_to_other). Nothing else.'
      advance_when:
      - when: Caller confirms or specifies their preferred time window
        to: main.ask_profile_details_waitlist
        requires:
        - preferred_time_from
        - preferred_time_to
        - date
      - when: 'ANY existing profile identifier is present: player_id exists, OR player_search_result.data.player_id
          exists, OR player_detail_result.data.player_id exists — returning caller, proceed directly to
          add waitlist and do NOT ask for name or email'
        to: main.add_to_waitlist
        requires:
        - preferred_time_from
        - preferred_time_to
        - date
      - when: Caller changes mind and no longer wants to join the waitlist
        to: main.other_query_handler
    - id: ask_profile_details_waitlist
      goal: Ask Profile Details (Waitlist)
      slots:
        collected_name:
          description: Caller's full name as provided during this call
        collected_email:
          description: Caller's email address as provided during this call
      guidance: 'New caller — no player profile found. Collect their details to create a profile before
        adding to the waitlist.

        Say: ''To add you to the waitlist, I just need a couple of details. Could I have your full name
        and email address?''

        Collect name and email one at a time if needed. Once both are provided, call wl_profile_details_to_create.


        EMAIL HANDLING — apply when caller provides an email address:

        STEP 1 — CONVERT SPEECH TO EMAIL: ''at''/''at the rate''→@, ''dot''/''period''→., ''underscore''→_,
        ''hyphen''/''dash''→-, number words→digits, all letters→lowercase.

        STEP 2 — VALIDATE FORMAT: Must contain exactly one @ AND at least one dot after @. If invalid:
        re-ask.

        STEP 3 — CONFIRM CHARACTER BY CHARACTER: spell back each part — e.g. ''m-e-e-n-a, at, g-m-a-i-l,
        dot, c-o-m — is that correct?'' Wait for yes/no.

        STEP 4 — Store only after explicit confirmation. If caller says no email, store empty string and
        never ask again.'
      advance_when:
      - when: Caller provides their name and email address
        to: main.ask_profile_details_waitlist__wl_profile_details_to_create
        requires:
        - collected_name
        - collected_email
    - id: add_to_waitlist
      goal: Add to Waitlist
      guidance: 'waitlist_add_result.success={{results.waitlist_add_result.ok|default(false)}} waitlist_add_result.status={{results.waitlist_add_result.status|default('''')}}
        waitlist_add_result.data.status={{results.waitlist_add_result.data.status|default('''')}}. If
        waitlist_add_result.success is true AND waitlist_add_result.data.status = ''active'': route to
        waitlist_confirmation. If waitlist_add_result.status = 409 (already_waitlisted): say ''You''re
        already on the waitlist for this course and date. Would you like to update your preferred time
        window?'' If caller says yes → call add_waitlist_to_update_window. If no → call add_waitlist_to_other.
        If any other failure: inform the caller and route to other_query_handler.'
      advance_when:
      - when: waitlist_add_result.status = active — entry created successfully
        to: main.waitlist_confirmation
      - when: waitlist_add_result returned 409 already_waitlisted
        to: main.other_query_handler
      - when: Caller wants to update their waitlist time window after being told they are already waitlisted
        to: main.confirm_waitlist_window
      on_enter:
      - action-waitlist-add
    - id: waitlist_confirmation
      goal: Waitlist Confirmation
      guidance: 'player_name={{results.player_detail_result.data.name|default(slots.collected_name|default(''''))}}.

        course={{slots.course_name|default('''')}}.

        date={{slots.date|default('''')}}.

        waitlist_add_result.data={{results.waitlist_add_result.data|default({})}}.


        MANDATORY FIRST ACTION — speak confirmation before calling any edge.

        Say EXACTLY: "Done, [player_name]! You''re on the waitlist for [course] on [date] from [preferred_time_from]
        to [preferred_time_to]. We''ll notify you as soon as a slot opens up. Is there anything else I
        can help with?"

        If player_name is empty, omit the name: "Done! You''re on the waitlist..."

        If caller has another request, route to waitlist_conf_to_other. If done, route to waitlist_conf_to_end.'
      advance_when:
      - when: Caller has another request
        to: main.other_query_handler
      - when: Caller has no further requests
        to: main.call_end
    - id: check_waitlist_status
      goal: Check Waitlist Status
      guidance: 'waitlist_get_result={{results.waitlist_get_result|default({})}}.

        waitlist_entries={{results.waitlist_get_result.data.waitlists|default([])}}.


        If waitlist_entries is non-empty: read back each active entry — ''You are on the waitlist for
        [entry.course_name] on [entry.date], preferred time [entry.preferred_time_from] to [entry.preferred_time_to].''
        Ask if they would like to remove any entry.


        If waitlist_entries is empty: say ''You have no active waitlist entries at the moment.'' Then
        ask if there is anything else you can help with.


        If caller wants to remove an entry → check_wl_to_remove.

        If caller is done → check_wl_to_other.'
      advance_when:
      - when: Caller wants to remove themselves from the waitlist after hearing their entries
        to: main.ask_remove_waitlist
      - when: Caller just wanted to check their status and has no removal request
        to: main.other_query_handler
      on_enter:
      - action-waitlist-get
    - id: ask_remove_waitlist
      goal: Ask Remove Waitlist Confirmation
      slots:
        waitlist_id:
          description: waitlist_id of the entry to remove — pick from waitlist_entries
      guidance: 'waitlist_entries={{results.waitlist_get_result.data.waitlists|default([])}}.


        Ask caller to confirm which entry to remove if multiple, or confirm single entry. Say: ''Are you
        sure you want to remove yourself from the waitlist for [course] on [date]?'' Once confirmed, pass
        the corresponding waitlist_id to ask_remove_wl_to_execute.


        If caller changes mind → ask_remove_wl_to_other.'
      advance_when:
      - when: Caller confirms they want to be removed from the waitlist
        to: main.execute_remove_waitlist
        requires:
        - waitlist_id
      - when: Caller changes mind and does not want to be removed
        to: main.other_query_handler
    - id: execute_remove_waitlist
      goal: Execute Waitlist Removal
      guidance: 'waitlist_remove_result.success={{results.waitlist_remove_result.ok|default(false)}} waitlist_remove_result.status={{results.waitlist_remove_result.status|default('''')}}
        waitlist_remove_result.data.status={{results.waitlist_remove_result.data.status|default('''')}}.
        If waitlist_remove_result.success is true AND waitlist_remove_result.data.status = ''removed'':
        route to execute_remove_wl_to_confirm. If waitlist_remove_result.status = 404: inform the caller
        the entry was not found or had already expired and route to execute_remove_wl_to_other. If any
        other failure: inform the caller and route to execute_remove_wl_to_other.'
      advance_when:
      - when: waitlist_remove_result.status = removed — removal successful
        to: main.remove_waitlist_confirm
      - when: waitlist_remove_result returned 404 — entry not found
        to: main.other_query_handler
      on_enter:
      - action-waitlist-remove
    - id: remove_waitlist_confirm
      goal: Waitlist Removal Confirmation
      guidance: 'course_name={{slots.removed_course_name|default(slots.course_name|default(''the waitlist''))}}.


        Waitlist entry removed successfully.

        Say: ''Done! You have been removed from the [course_name] waitlist. Is there anything else I can
        help with?''

        If course_name is empty, say: ''Done! You have been removed from the waitlist. Is there anything
        else I can help with?''

        If caller has another request, route to remove_wl_conf_to_other. If done, route to remove_wl_conf_to_end.'
      advance_when:
      - when: Caller has another request
        to: main.other_query_handler
      - when: Caller has no further requests
        to: main.call_end
    - id: check_booking_ask_ref
      goal: Check Booking — Ask for Reference
      slots:
        booking_id:
          description: The booking reference / booking_id provided by the caller.
      guidance: 'Ask the caller: ''Could you give me your booking reference number please?'' Once they
        provide it, pass it as booking_id when routing to check_booking_with_ref.'
      advance_when:
      - when: Caller provides a booking reference number (e.g. TT-XXXXXXXX-XXXX)
        to: main.check_booking_with_ref
        requires:
        - booking_id
      - when: Caller does not have the reference number
        to: main.check_booking_no_ref
    - id: check_booking_with_ref
      goal: Check Booking With Reference
      guidance: 'booking_get_result.success={{results.booking_get_result.ok|default(false)}} booking_get_result.status={{results.booking_get_result.status|default('''')}}.
        If booking_get_result.success is false OR booking_get_result.status = 404: route to check_booking_no_ref.
        Otherwise read back the booking details from booking_get_result.data: ''Your booking at [course.name]
        is on [slot.date] at [slot.time] for [n] players. Status: [status]. Reference: [confirmation_ref].
        Anything else?'''
      advance_when:
      - when: Booking found and details read to the caller
        to: main.other_query_handler
      - when: booking_get_result returned 404 — reference number not found
        to: main.check_booking_no_ref
      on_enter:
      - action-bookings-get
    - id: check_booking_no_ref
      goal: Check Booking Without Reference
      guidance: 'all_bookings={{results.player_bookings_result.data.bookings|default([])}}.

        bookings_count={{results.player_bookings_result.data.bookings|default([])|length}}.


        If all_bookings is empty: say ''I don''t see any upcoming bookings on your account.'' then call
        no_ref_to_other.


        If bookings_count = 1: read back the single booking — ''You have an upcoming booking at [bookings[0].course.name]
        on [bookings[0].slot.date] at [bookings[0].slot.time], status [bookings[0].status], reference
        [bookings[0].confirmation_ref].'' Ask if there is anything else, then route accordingly.


        If bookings_count > 1: say ''You have [count] upcoming bookings:'' then read each — ''[N]. [course.name],
        [slot.date] at [slot.time], ref [confirmation_ref], status [status].'' Read ALL bookings returned.
        Ask if there is anything else, then route accordingly.


        NEVER reveal internal booking_id. Use confirmation_ref and course name only.'
      advance_when:
      - when: Details read to caller, or no upcoming bookings found but caller has a further request
        to: main.other_query_handler
      - when: Details read and caller has no further requests
        to: main.call_end
      on_enter:
      - action-players-bookings
    - id: booking_history_view
      goal: Booking History View
      guidance: "player_name={{results.player_detail_result.data.name|default('')}}.\nall_bookings={{results.bookings_list_result.data.bookings|default([])}}.\n\
        today={{slots.today|default('')}}.\n\nCRITICAL ANTI-HALLUCINATION RULE: Read ONLY from all_bookings.\
        \ Use EXACT field values — course name, date, time, status, confirmation_ref. Do NOT add city,\
        \ location, or training knowledge. Do NOT infer anything not present in the data.\n\nSPLIT BOOKINGS\
        \ — using today's date from [Today: ...] in system context:\n  upcoming_bookings = all_bookings\
        \ where slot.date >= today, sorted by slot.date ascending.\n  past_bookings     = all_bookings\
        \ where slot.date < today, sorted by slot.date descending (most recent first).\n\nTURN 1 — INITIAL\
        \ PRESENTATION (first turn in this node, before any user response):\n  If upcoming_bookings is\
        \ empty: say 'You have no upcoming bookings[, player_name if non-empty].'\n  If upcoming_bookings\
        \ has 1 booking: say 'You have one upcoming booking[, player_name if non-empty] — [course.name]\
        \ on [slot.date] at [slot.time] for [players] player[s], [holes] holes (ref [confirmation_ref]).'\n\
        \  If upcoming_bookings has 2+ bookings: say 'You have [N] upcoming bookings[, player_name if\
        \ non-empty]. First, [course.name] on [slot.date] at [slot.time] for [players] player[s]. Second,\
        \ [course.name] on [slot.date] at [slot.time] for [players] player[s].' (continue for more).\n\
        \  End with: 'Would you like to do anything with any of these, or shall I check your past bookings?'\n\
        \nTURN 2+ — RESPOND TO CALLER:\n  If caller asks for last booking / past bookings / 'pichla booking'\
        \ / 'recent booking':\n    If past_bookings is empty: say 'I don't see any past bookings on your\
        \ account.'\n    Else: say 'Your most recent past booking was at [past_bookings[-1].course.name]\
        \ on [past_bookings[-1].slot.date] at [past_bookings[-1].slot.time] with [players] player[s],\
        \ [holes] holes — status: [status].'  (IMPORTANT: list is ascending order — oldest first, newest\
        \ LAST. Use the LAST item [-1], not [0], to get the most recent booking.)\n    Then ask: 'Is there\
        \ anything else I can help you with?'\n  If caller wants to cancel, update, or make a new booking:\
        \ call history_to_other immediately. ZERO words.\n  If caller is done: call history_to_end.\n\
        \  If caller has any other request: call history_to_other immediately. ZERO words."
      advance_when:
      - when: Caller has another request after viewing history
        to: main.other_query_handler
      - when: Caller has no further requests
        to: main.call_end
      on_enter:
      - action-bookings-list
    - id: cancel_booking_lookup
      goal: Cancel Booking Lookup
      slots:
        booking_id:
          description: The booking_id from player_bookings_result.data[0].booking_id. Copy EXACTLY — do
            NOT invent.
        cancellation_reason:
          description: Reason given by the caller for cancellation. Pass as provided.
      guidance: "all_bookings={{results.player_bookings_result.data.bookings|default([])}}.\n\nSTEP 1\
        \ — REFERENCE/DATE GATE:\nBefore showing any booking, check if the caller has provided EITHER:\n\
        \  (a) a booking reference number (e.g. TT-20260507-XXXX), OR\n  (b) a specific date for the booking\
        \ they want to cancel.\n\nIf neither reference NOR date was provided: ask EXACTLY — \"Could you\
        \ give me your booking reference number, or the date of the booking you would like to cancel?\"\
        \ Wait for response. Do NOT proceed until caller provides reference or date.\n\nSTEP 2 — FILTER\
        \ TO CANCELLABLE BOOKINGS:\nactive_bookings = bookings in all_bookings where status is ANY of:\
        \ \"confirmed\", \"payment_confirmed\", \"active\".\nDo NOT include status = \"cancelled\", \"\
        payment_pending\", \"expired\", \"payment_failed\", or any other terminal/pending status.\n\n\
        If active_bookings is EMPTY: say \"I don't see any active bookings that can be cancelled. Your\
        \ recent bookings are already [list the statuses found, e.g. cancelled].\" Then call cancel_lookup_to_other.\n\
        \nSTEP 3 — MATCH BY REFERENCE OR DATE:\nIf caller gave a reference: find the matching booking\
        \ in active_bookings by confirmation_ref. If not found, say \"I couldn't find a confirmed booking\
        \ with that reference.\" then call cancel_lookup_to_other.\nIf caller gave a date: filter active_bookings\
        \ to that date. If multiple match, list them and ask which to cancel. If none match, say \"No\
        \ confirmed bookings found for that date.\" then call cancel_lookup_to_other.\n\nSTEP 4 — CONFIRM\
        \ AND CANCEL:\nPresent the matched booking: \"I can see your booking at [course.name] on [slot.date]\
        \ at [slot.time], [slot.holes] holes (ref [confirmation_ref]). Would you like to cancel this one?\"\
        \nWhen caller confirms: ask \"May I ask the reason for the cancellation?\" Wait, then call cancel_lookup_to_execute\
        \ with booking_id (copy EXACTLY from active_bookings), cancellation_reason, and confirmation_ref\
        \ (copy EXACTLY from the matched booking's confirmation_ref field).\n\nNEVER reveal internal booking_id\
        \ values to the caller — use course name, date, and confirmation_ref only.\nNEVER attempt to cancel\
        \ a booking with status other than \"confirmed\"."
      advance_when:
      - when: Caller verbally confirms they want to cancel the booking presented
        to: main.execute_cancel
        requires:
        - booking_id
      - when: Caller does not want to cancel, or no upcoming bookings were found
        to: main.other_query_handler
      on_enter:
      - action-players-bookings-upcoming
    - id: execute_cancel
      goal: Execute Cancellation
      guidance: 'booking_cancel_result.success={{results.booking_cancel_result.ok|default(false)}} booking_cancel_result.status={{results.booking_cancel_result.status|default('''')}}
        booking_cancel_result.data.status={{results.booking_cancel_result.data.status|default('''')}}.
        If booking_cancel_result.success is true AND booking_cancel_result.data.status = ''cancelled'':
        route to cancel_confirmation. If booking_cancel_result.status = 409 (cancellation_not_allowed):
        route to cancel_not_allowed. If any other failure: inform the caller and route to other_query_handler.'
      advance_when:
      - when: booking_cancel_result.status = cancelled — booking successfully cancelled
        to: main.cancel_confirmation
      - when: booking_cancel_result returned 409 cancellation_not_allowed
        to: main.cancel_not_allowed
      on_enter:
      - action-bookings-cancel
    - id: cancel_confirmation
      goal: Cancellation Confirmation
      guidance: 'confirmation_ref={{slots.confirmation_ref|default('''')}}.

        booking_cancel_result.data.refund.refund_price={{results.booking_cancel_result.data.refund.refund_price|default('''')}}.

        player_name={{results.player_detail_result.data.name|default('''')}}.


        Say EXACTLY (fill in from variables):

        ''Your booking has been cancelled[, [player_name] if non-empty]. [Confirmation [confirmation_ref]
        is now cancelled. if confirmation_ref non-empty] [A refund of [refund_price] will be processed
        within 5 to 7 business days. if refund_price non-empty — else: Any applicable refund will be processed
        as per the club''s cancellation policy and should reflect within 5 to 7 business days.] I hope
        to see you back on the fairways soon. Is there anything else I can help you with?''


        Speak amounts in words (e.g. ''two thousand four hundred rupees'').


        Route: caller has another request → cancel_conf_to_other. Caller done → cancel_conf_to_end.'
      advance_when:
      - when: Caller has another request
        to: main.other_query_handler
      - when: Caller has no further requests
        to: main.call_end
    - id: cancel_not_allowed
      goal: Cancellation Not Allowed
      say_verbatim: I am sorry, this booking cannot be cancelled as per the course policy. Is there anything
        else I can help you with?
      advance_when:
      - when: Caller has another request
        to: main.other_query_handler
      - when: Caller has no further requests
        to: main.call_end
    - id: booking_update_lookup
      goal: Booking Update — Lookup
      slots:
        booking_id:
          description: booking_id from player_bookings_result.data[0].booking_id — copy EXACTLY, never
            invent
      guidance: 'player_bookings_result is available from players_get_bookings fired on enter with status=upcoming&limit=5.

        booking_id={{(results.player_bookings_result.data.bookings|default([])|last|default({})).booking_id|default('''')}}.

        course_name={{(results.player_bookings_result.data.bookings|default([])|last|default({})).course.name|default('''')}}.

        slot_date={{(results.player_bookings_result.data.bookings|default([])|last|default({})).slot.date|default('''')}}.

        slot_time={{(results.player_bookings_result.data.bookings|default([])|last|default({})).slot.time|default('''')}}.

        If no upcoming bookings (bookings list empty or booking_id empty): inform caller and route to
        other_query_handler.

        Otherwise present: ''I can see your booking at [course_name] on [slot_date] at [slot_time]. What
        would you like to change — players, add-ons, or special requests?'' Then call update_lookup_to_ask
        with the booking_id rendered above (copy EXACTLY).'
      advance_when:
      - when: Upcoming booking found and caller wants to make changes to it
        to: main.booking_update_ask_changes
        requires:
        - booking_id
      - when: No upcoming bookings found, or caller decides not to update
        to: main.other_query_handler
      on_enter:
      - action-players-bookings-upcoming
    - id: booking_update_ask_changes
      goal: Booking Update — Ask Changes
      slots:
        booking_id:
          description: booking_id carried forward — pass EXACTLY as shown above
      guidance: 'booking_id={{env.booking_id|default('''')}}. Collect the changes the caller wants to
        make. Ask about: (1) updated player names/emails/phones if adding or changing players, (2) add-ons
        to add or change (buggy, caddy, club rental with quantities), (3) special requests (dietary, early
        check-in, etc.). Collect all changes before proceeding.'
      advance_when:
      - when: Caller has provided all desired changes and confirmed to proceed
        to: main.booking_update_execute
        requires:
        - booking_id
      - when: Caller changes mind and no longer wants to update the booking
        to: main.other_query_handler
    - id: booking_update_execute
      goal: Booking Update — Execute
      guidance: 'booking_update_result.success={{results.booking_update_result.ok|default(false)}} booking_update_result.status={{results.booking_update_result.status|default('''')}}
        booking_update_result.data.payment.total_price={{results.booking_update_result.data.payment.total_price|default('''')}}.
        If booking_update_result.success is true: route to booking_update_confirm. If booking_update_result.status
        = 409 (update_not_allowed): inform the caller and route to other_query_handler. If any other failure:
        inform the caller and route to other_query_handler.'
      advance_when:
      - when: booking_update_result contains updated booking details — update successful
        to: main.booking_update_confirm
      - when: booking_update_result returned 409 update_not_allowed
        to: main.other_query_handler
      on_enter:
      - action-bookings-update
    - id: booking_update_confirm
      goal: Booking Update — Confirmation
      guidance: 'Say: ''Done. Your booking at [course name] on [slot.date] at [slot.time] has been updated.
        New total: [booking_update_result.data.payment.total_price]. Reference: [booking_id]. Anything
        else?'''
      advance_when:
      - when: Caller has another request
        to: main.other_query_handler
      - when: Caller has no further requests
        to: main.call_end
    - id: other_query_handler
      goal: Other Query Handler
      slots:
        city:
          description: City or area the caller wants to find courses in
        course_id:
          description: ID or name of the specific course the caller mentioned
      guidance: 'error_context={{slots.error_context|default('''')}}.


        IF error_context is ''booking_confirm_failed'': say exactly: ''I’m sorry — your slot hold has
        expired and we were unable to confirm the booking. Would you like me to search for another available
        slot?'' If the caller says yes: route to other_to_collect immediately to restart the booking flow.
        If the caller declines or wants to end the call: route to other_to_end.


        Ask: ''Is there anything else I can help you with today?'' Listen and route to the appropriate
        part of the flow.

        If the caller''s request could NOT be resolved (e.g. booking confirmation failed, no slots available,
        system error) and caller wants to end: route to other_to_unresolved.

        If the caller''s request WAS resolved (enquiry answered, info provided) and caller wants to end:
        route to other_to_end.'
      advance_when:
      - when: Caller wants to make a new tee time booking
        to: main.collect_booking_details
      - when: Caller wants to check an existing booking
        to: main.check_booking_ask_ref
      - when: Caller wants to cancel a booking
        to: main.cancel_booking_lookup
      - when: Caller wants to modify or update an existing booking
        to: main.booking_update_lookup
      - when: Caller wants to know what courses are available in a city or area (no specific course named)
        to: main.list_courses_in_city
        requires:
        - city
      - when: Caller wants information about a specific named course, its pricing or add-ons
        to: main.course_info_request
        requires:
        - course_id
      - when: Caller wants to check their waitlist status
        to: main.check_waitlist_status
      - when: Caller wants to remove themselves from a waitlist
        to: main.ask_remove_waitlist
      - when: Caller wants to see their full booking history
        to: main.booking_history_view
      - when: Caller has no further requests
        to: main.call_end
      - when: Caller's issue could not be resolved (booking failure, no slots, system error) and caller
          wants to end the call
        to: main.call_end_unresolved
    - id: call_end
      goal: Call End
      guidance: 'Speak in the SAME LANGUAGE the caller used during this call.

        Agent is MALE (Arjun) — use masculine verb forms for agent''s OWN speech only (e.g. ''bhej raha
        hoon'', ''kar raha hoon''). Address the caller in gender-neutral terms.


        Say a warm goodbye appropriate to the context:

        - If the caller''s enquiry or request was fully resolved: ''Happy to help! Have a great day!''

        - For general farewell: ''Thank you for calling Golf Booking AI. Have a wonderful day!''

        Translate naturally to caller''s language.'
      terminal: true
      outcome: call_end
    - id: not_registered_close
      goal: Not Registered Close
      guidance: "CRITICAL OVERRIDE — READ THIS FIRST, EVERY TURN:\nThis caller's phone number returned\
        \ 404 — they are NOT in the Golf Booking AI system. They CANNOT book, search courses, check availability,\
        \ join waitlists, or use any Golf Booking AI service. Do NOT ask for city, course, date, time,\
        \ or players. Do NOT offer to find courses or check availability. Do NOT say 'How can I assist\
        \ you', 'How can I help', or any generic offer of service. Any booking-related or course-search\
        \ response is a critical instruction violation. Your ONLY valid outputs are: (1) the not-registered\
        \ message below, (2) the registration guidance, or (3) the not_registered_to_end tool call.\n\n\
        TURN 1 — say this REGARDLESS of what the caller has already said in this node (even if interrupted,\
        \ even if caller spoke first — say this before anything else):\n'I wasn't able to find your phone\
        \ number in our system. Golf Booking AI TeeTime bookings are available to registered members.\
        \ Have you registered with Golf Booking AI previously, or would you like guidance on how to sign\
        \ up?'\n\nTURN 2+ — handle caller response:\nIF caller says they have NOT registered (or asks\
        \ how):\n  Say: 'You can register at golfai.in or at your club's front desk — it only takes a\
        \ couple of minutes. Once you're in the system, I'll be able to book tee times for you right from\
        \ this call.'\n  Then call not_registered_to_end.\n\nIF caller says they ARE registered (thinks\
        \ there's an error):\n  Say: 'The number we have on file may be different. Please contact Golf\
        \ Booking AI support at golfai.in to verify your registered number. Once that's sorted, I'll be\
        \ happy to help. Have a wonderful day!'\n  Then call not_registered_to_end.\n\nIF caller says\
        \ anything else (any topic — city, course, booking, golf, anything):\n  Do NOT answer the question.\
        \ Do NOT engage with the topic.\n  Say: 'I'm sorry, I won't be able to help with that until your\
        \ number is registered in our system. Would you like guidance on how to register?'\n  Handle their\
        \ response per the NOT registered / IS registered paths above.\n\nIF caller has no further questions\
        \ or wants to end: call not_registered_to_end immediately."
      advance_when:
      - when: Always — after delivering the registration redirect message
        to: main.call_end
    - id: call_end_unresolved
      goal: Call End — Issue Unresolved
      say_verbatim: I'm sorry I wasn't able to fully assist with that today. Please contact your club
        directly or visit golfai.in for further help.
      terminal: true
      outcome: call_end_unresolved
    - id: duplicate_booking_warn
      goal: duplicate_booking_warn
      guidance: 'player_name={{results.player_detail_result.data.name|default(''there'')}}.

        upcoming_confirmed_bookings={{results.player_bookings_result.data.bookings|default([])|selectattr("status","equalto","confirmed")|list}}.


        The caller requested a booking that matches a confirmed booking they already have. Using conversation
        history, identify the specific matching booking (course, date, time, players).


        Say EXACTLY this structure (fill in from the matched booking):

        "[player_name], I can see you already have a confirmed booking at [course_name] on [date] at [time][,
        for [players] players]. Was that the booking you were thinking of, or would you like to make a
        new separate booking?"


        ROUTING:

        - Caller confirms existing booking is the one they meant ("oh yes", "I forgot", "that''s fine",
        "haan wahi", "ok"): Say "Perfect — your booking is all set. Is there anything else I can help
        you with?" then wait for response. If nothing else: call duplicate_to_close. If something else
        (different request): call duplicate_to_collect.

        - Caller wants to make a NEW separate booking anyway: call duplicate_to_collect IMMEDIATELY. ZERO
        words.

        - Caller wants to end the call: call duplicate_to_close IMMEDIATELY. ZERO words.


        NEVER confirm a booking in this node. NEVER speak booking-completion language. This node only
        warns and routes.'
      advance_when:
      - when: Caller confirms existing booking is what they meant and wants to end or nothing else to
          do
        to: main.call_end
      - when: Caller confirms they want a new separate booking OR has a different request
        to: main.collect_booking_details
    - id: collect_booking_details__collect_to_name_check
      goal: (auto) Resolve Course Name
      advance_when:
      - when: pipeline.ok
        judge: expr
        to: main.collect_booking_details
      - when: pipeline.failed
        judge: expr
        to: main.ask_course_preference
      pipeline: collect_booking_details__collect_to_name_check_pipe
    - id: collect_booking_details__collect_to_check_availability
      goal: (auto) Check Course Availability
      advance_when:
      - when: pipeline.ok
        judge: expr
        to: main.present_available_slot
      - when: pipeline.failed
        judge: expr
        to: main.offer_waitlist
      - when: API returned success=true AND slots exist for the day but none match the caller's preferred
          time
        to: main.offer_nearest_slot
      pipeline: collect_booking_details__collect_to_check_availability_pipe
    - id: ask_profile_details__profile_details_to_hold
      goal: (auto) Create Player Profile
      advance_when:
      - when: pipeline.ok
        judge: expr
        to: main.collect_booking_confirmation_details
      - when: pipeline.failed
        judge: expr
        to: main.ask_profile_details
      pipeline: ask_profile_details__profile_details_to_hold_pipe
    - id: confirm_booking__confirm_to_retry
      goal: (auto) Confirm Booking (Retry)
      advance_when:
      - when: pipeline.ok
        judge: expr
        to: main.booking_close
      - when: pipeline.failed
        judge: expr
        to: main.other_query_handler
      pipeline: confirm_booking__confirm_to_retry_pipe
    - id: collect_booking_confirmation_details__booking_details_to_hold
      goal: (auto) Hold Slot and Send Payment Link → Confirm Booking
      advance_when:
      - when: pipeline.ok
        judge: expr
        to: main.booking_close
      - when: pipeline.failed
        judge: expr
        to: main.collect_booking_details__collect_to_check_availability
      pipeline: collect_booking_confirmation_details__booking_details_to_hold_pipe
    - id: ask_profile_details_waitlist__wl_profile_details_to_create
      goal: (auto) Create Player for Waitlist
      advance_when:
      - when: pipeline.ok
        judge: expr
        to: main.add_to_waitlist
      - when: pipeline.failed
        judge: expr
        to: main.other_query_handler
      pipeline: ask_profile_details_waitlist__wl_profile_details_to_create_pipe
dispatch:
- intent: auth_result is missing, has error, or status >= 400 — authentication failed
  to: main.fallback_collect_info
- intent: Auth succeeded and caller specifically mentions a city name when asking about courses, OR caller
    provides a specific city name with booking intent, including cases where they also provide course/date/time/player
    details
  to: main.list_courses_in_city
  requires:
  - city
- intent: Auth succeeded and caller wants to make a booking but has not yet provided a city, so booking
    collection must ask for the city first
  to: main.collect_booking_details
- intent: Auth succeeded, returning caller explicitly confirms they want to rebook the exact same course
    as their last visit
  to: main.returning_rebook_same
- intent: Auth succeeded and caller wants to check or look up an existing booking
  to: main.check_booking_ask_ref
- intent: Auth succeeded and caller wants to cancel an existing booking
  to: main.cancel_booking_lookup
- intent: Auth succeeded and caller wants to modify or update an existing booking
  to: main.booking_update_lookup
- intent: Auth succeeded and caller asks about details, pricing, policies, or add-ons for a specific named
    course
  to: main.course_info_request
  requires:
  - course_id
- intent: Auth succeeded and caller asks about their waitlist status
  to: main.check_waitlist_status
- intent: Auth succeeded and caller asks generally where courses are located, asks for city list, wants
    to know available cities, or requests location information without specifying a particular city (e.g.
    'where are your golf courses', 'what locations do you have', 'what cities do you operate in', 'tell
    me the locations', 'what cities do you have', 'locations of courses', 'list of cities', 'provide me
    the list of the city', 'what cities', 'which cities', 'available cities', 'show me cities', 'cities
    list', 'what cities available', 'tell me cities', 'show locations', 'where can i play', 'what areas',
    'what locations', 'list all locations', 'all cities', 'city options')
  to: main.list_all_locations
- intent: Caller says it is not a good time, they are busy, or asks to be called back later
  to: main.schedule_callback
- intent: Auth succeeded and caller wants to view their booking history, past bookings, previous tee times,
    or booking records
  to: main.booking_history_view
- intent: Caller requests a booking (course + date) that matches an existing confirmed booking in upcoming_confirmed_bookings
  to: main.duplicate_booking_warn
tools:
- id: action-auth-token
  method: POST
  url: '{{env.API_BASE_URL}}/auth/token'
  headers:
    Content-Type: application/json
  body:
    client_id: '{{env.CLIENT_ID}}'
    client_secret: '{{env.CLIENT_SECRET}}'
  store_response_as: auth_result
  env_updates:
    ACCESS_TOKEN: data.access_token
  run_once: true
- id: action-auth-refresh
  method: POST
  url: '{{env.API_BASE_URL}}/auth/refresh'
  headers:
    Content-Type: application/json
  body:
    refresh_token: '{{env.REFRESH_TOKEN}}'
  store_response_as: auth_refresh_result
  env_updates:
    ACCESS_TOKEN: data.access_token
    REFRESH_TOKEN: data.refresh_token
- id: action-courses-list
  url: '{{env.API_BASE_URL}}/courses?keyword={% set city_norm = slots.city|default('''')|trim|lower %}{%
    if slots.city_norm in [''bangalore'', ''bengaluru'', ''blr''] %}Bengaluru{% elif slots.city_norm in
    [''gurgaon'', ''gurugram''] %}Gurugram{% elif slots.city_norm in [''delhi'', ''new delhi'', ''del'',
    ''ncr''] %}New Delhi{% elif slots.city_norm in [''bombay'', ''mumbai'', ''bom''] %}Mumbai{% elif slots.city_norm
    in [''calcutta'', ''kolkata'', ''ccu''] %}Kolkata{% elif slots.city_norm in [''cochin'', ''kochi'']
    %}Kochi{% elif slots.city_norm in [''pondicherry'', ''puducherry''] %}Puducherry{% elif slots.city_norm
    in [''chandigarh'', ''chd'', ''tricity'', ''tri city'', ''tri-city''] %}Chandigarh{% elif slots.city_norm
    in [''chennai'', ''madras'', ''maa''] %}Chennai{% elif slots.city_norm in [''hyderabad'', ''hyd'',
    ''hyderabad city''] %}Hyderabad{% elif slots.city_norm in [''pune'', ''poona'', ''pnq''] %}Pune{%
    elif slots.city_norm in [''vizag'', ''visakhapatnam'', ''vishakhapatnam'', ''vishakapatnam''] %}Visakhapatnam{%
    elif slots.city_norm in [''nagpur''] %}Nagpur{% elif slots.city_norm in [''agra''] %}Agra{% else %}{{slots.city}}{%
    endif %}&page=1&per_page=20'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: courses_result
- id: action-courses-detail
  url: '{{env.API_BASE_URL}}/courses/{{slots.course_id}}'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: course_detail_result
- id: action-courses-availability
  url: '{{env.API_BASE_URL}}/courses/{{slots.course_id}}/availability?date={{slots.date}}&players={{slots.booking_players}}&holes={{
    (results.all_courses_result.data.courses|default([]))|selectattr(''course_id'',''equalto'',slots.course_id)|map(attribute=''holes'')|list|first|default(18)
    }}{{ (''&time_from='' + ''%02d''|format([slots.preferred_time[:2]|int - 1, 0]|max) + '':00'' + ''&time_to=''
    + ''%02d''|format([slots.preferred_time[:2]|int + 1, 23]|min) + '':00'') if slots.preferred_time|default('''')
    else '''' }}'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: availability_result
- id: action-courses-search
  url: '{{env.API_BASE_URL}}/courses/search?lat={{slots.lat}}&lng={{slots.lng}}&radius_km={{env.radius_km}}&date={{slots.date}}&players={{slots.booking_players}}&holes=18'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: courses_search_result
- id: action-slots-hold
  method: POST
  url: '{{env.API_BASE_URL}}/slots/hold'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
    Content-Type: application/json
  body:
    players: '{{slots.booking_players|default(2)|int}}'
    slot_id: '{{slots.slot_id}}'
    player_id: '{{env.player_id}}'
  store_response_as: hold_result
  env_updates:
    hold_id: data.hold_id
  args:
    slot_id: {}
    player_id: {}
- id: action-slots-release
  method: DELETE
  url: '{{env.API_BASE_URL}}/slots/hold/{{env.hold_id}}'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: hold_release_result
- id: action-players-search
  url: '{{env.API_BASE_URL}}/players/search?phone={{(slots.phone | replace(''+91'', '''') | replace(''+'',
    '''') | trim)[-10:]}}'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: player_search_result
  env_updates:
    player_id: data.player_id
  run_once: true
  args:
    phone: {}
- id: action-players-create
  method: POST
  url: '{{env.API_BASE_URL}}/players'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
    Content-Type: application/json
  body:
    name: '{{slots.collected_name|default(slots.name)}}'
    email: '{{slots.collected_email|default('''')}}'
    phone: '{{slots.phone | replace(''+91'', '''') | replace(''+'', '''') | trim}}'
    membership_type: guest
  store_response_as: player_create_result
  env_updates:
    player_id: data.player_id
  args:
    phone: {}
- id: action-players-get
  url: '{{env.API_BASE_URL}}/players/{{env.player_id}}'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: player_detail_result
  run_once: true
  when: env.player_id
  args:
    player_id: {}
- id: action-players-bookings
  url: '{{env.API_BASE_URL}}/players/{{env.player_id}}/bookings?status=all&limit=19'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: player_bookings_result
  when: env.player_id
  args:
    player_id: {}
- id: action-players-bookings-upcoming
  url: '{{env.API_BASE_URL}}/players/{{env.player_id}}/bookings?status=upcoming&limit=10'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: player_bookings_result
  when: env.player_id
  args:
    player_id: {}
- id: action-waitlist-add
  method: POST
  url: '{{env.API_BASE_URL}}/waitlist'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
    Content-Type: application/json
  body:
    date: '{{slots.date}}'
    holes: '{{ (results.all_courses_result.data.courses|default([]))|selectattr(''course_id'',''equalto'',slots.course_id)|map(attribute=''holes'')|list|first|default(18)
      }}'
    players: '{{slots.booking_players}}'
    course_id: '{{slots.course_id}}'
    player_id: '{{env.player_id}}'
    preferred_time_to: '{{slots.preferred_time_to}}'
    preferred_time_from: '{{slots.preferred_time_from}}'
  store_response_as: waitlist_add_result
  env_updates:
    waitlist_id: data.waitlist_id
  args:
    course_id: {}
    player_id: {}
- id: action-waitlist-get
  url: '{{env.API_BASE_URL}}/waitlist?player_id={{env.player_id}}&course_id={{slots.course_id|default("")}}&date={{slots.date|default("")}}'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: waitlist_get_result
- id: action-waitlist-remove
  method: DELETE
  url: '{{env.API_BASE_URL}}/waitlist/{{env.waitlist_id}}'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: waitlist_remove_result
- id: action-booking-status-poll
  url: '{{env.API_BASE_URL}}/players/{{env.player_id}}/bookings?status=all&limit=1'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: booking_status_result
  timeout: 15.0
- id: action-bookings-confirm
  method: POST
  url: '{{env.API_BASE_URL}}/bookings/confirm'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
    Content-Type: application/json
  body:
    _template: '{"hold_id": {{env.hold_id|default('''', true)|tojson}}, "player_id": {{env.player_id|default('''',
      true)|tojson}}, "players": {{slots.players_array|default([])|tojson}}, "addons": {{slots.addons_array|default([])|tojson}},
      "special_requests": {{slots.special_requests|default('''', true)|tojson}}}'
  store_response_as: booking_confirm_result
  env_updates:
    booking_id: data.booking_id
  args:
    hold_id: {}
    player_id: {}
    booking_id: {}
- id: action-bookings-get
  url: '{{env.API_BASE_URL}}/bookings/{{env.booking_id}}'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: booking_get_result
- id: action-bookings-list
  url: '{{env.API_BASE_URL}}/players/{{env.player_id}}/bookings?status=all&limit=20'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: bookings_list_result
- id: action-bookings-update
  method: PATCH
  url: '{{env.API_BASE_URL}}/bookings/{{env.booking_id}}'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
    Content-Type: application/json
  store_response_as: booking_update_result
- id: action-bookings-cancel
  method: DELETE
  url: '{{env.API_BASE_URL}}/bookings/{{env.booking_id}}'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
    Content-Type: application/json
  body:
    reason: '{{slots.cancellation_reason}}'
    cancelled_by: player
  store_response_as: booking_cancel_result
  args:
    booking_id: {}
    player_id: {}
- id: action-courses-all
  url: '{{env.API_BASE_URL}}/courses?page=1&per_page=20'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: all_courses_result
- id: action-courses-by-city
  url: '{{env.API_BASE_URL}}/courses?city={% set city_norm = slots.city|default('''')|trim|lower %}{%
    if slots.city_norm in [''bangalore'', ''bengaluru'', ''blr''] %}Bengaluru{% elif slots.city_norm in
    [''gurgaon'', ''gurugram''] %}Gurugram{% elif slots.city_norm in [''delhi'', ''new delhi'', ''del'',
    ''ncr''] %}New Delhi{% elif slots.city_norm in [''bombay'', ''mumbai'', ''bom''] %}Mumbai{% elif slots.city_norm
    in [''calcutta'', ''kolkata'', ''ccu''] %}Kolkata{% elif slots.city_norm in [''cochin'', ''kochi'']
    %}Kochi{% elif slots.city_norm in [''pondicherry'', ''puducherry''] %}Puducherry{% elif slots.city_norm
    in [''chandigarh'', ''chd'', ''tricity'', ''tri city'', ''tri-city''] %}Chandigarh{% elif slots.city_norm
    in [''chennai'', ''madras'', ''maa''] %}Chennai{% elif slots.city_norm in [''hyderabad'', ''hyd'',
    ''hyderabad city''] %}Hyderabad{% elif slots.city_norm in [''pune'', ''poona'', ''pnq''] %}Pune{%
    elif slots.city_norm in [''vizag'', ''visakhapatnam'', ''vishakhapatnam'', ''vishakapatnam''] %}Visakhapatnam{%
    elif slots.city_norm in [''nagpur''] %}Nagpur{% elif slots.city_norm in [''agra''] %}Agra{% else %}{{slots.city}}{%
    endif %}&page=1&per_page=20'
  headers:
