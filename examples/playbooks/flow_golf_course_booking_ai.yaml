        \nCOURSE-TO-CITY INFERENCE — If the caller names a specific course (before or instead of naming\
        \ a city), derive the city from this map and skip asking for city in STEP 1:\n  \"Qutab Golf Course\
        \ - DDA\" → Delhi\n  \"DDA Golf Course Dwarka\" → Delhi\n  \"AEPTA Golf Course - Delhi\" → Delhi\n\
        \  \"Delhi Golf Club\" → Delhi\n  \"DLF Golf and Country Club\" → Gurugram\n  \"Karnataka Golf\
        \ Association\" → Bengaluru\n  \"Prestige Golfshire Club\" → Bengaluru\n  \"Royal Calcutta Golf\
        \ Club\" → Kolkata\n  \"Tollygunge Club\" → Kolkata\n  \"Bombay Presidency Golf Club\" → Mumbai\n\
        \  \"Hyderabad Golf Club\" → Hyderabad\n  \"Chandigarh Golf Club\" → Chandigarh\n  \"Anurakshan\
        \ Kaman Sports Complex-Nagpur\" → Nagpur\n  \"Aamby Valley Golf Club\" → Pune\n  \"Agra Golf Course\"\
        \ → Agra\nWhen course name is known → set city from above map → call collect_to_course_pref with\
        \ that city AND course_name immediately. Do NOT ask \"which city\". The city is already known\
