        \ / DLF Golf / DLF Gurgaon / DLF Country Club / Golf Course Road club → \"DLF Golf and Country\
        \ Club\"  (STT RULE: bare 'DLF' alone = New Delhi city; 'DLF Golf Course' with explicit 'Golf\
