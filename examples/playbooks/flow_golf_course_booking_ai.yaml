  store_response_as: city_courses_result
- id: action-courses-name-check
  url: '{{env.API_BASE_URL}}/courses/check-availability?name={{slots.course_name_query}}&date={{slots.date}}'
  headers:
    Authorization: Bearer {{env.ACCESS_TOKEN}}
  store_response_as: course_name_check_result
pipelines:
- id: collect_booking_details__collect_to_name_check_pipe
  steps:
  - tool: action-courses-name-check
    'on':
      failed: main.ask_course_preference
- id: collect_booking_details__collect_to_check_availability_pipe
  steps:
  - tool: action-courses-availability
    'on':
      failed: main.offer_waitlist
- id: ask_profile_details__profile_details_to_hold_pipe
  steps:
  - tool: action-players-create
- id: confirm_booking__confirm_to_retry_pipe
  steps:
  - tool: action-bookings-confirm
    'on':
      failed: main.other_query_handler
- id: collect_booking_confirmation_details__booking_details_to_hold_pipe
  steps:
  - tool: action-slots-hold
    'on':
      failed: main.collect_booking_details__collect_to_check_availability
  - tool: action-bookings-confirm
    'on':
      failed: main.confirm_booking__confirm_to_retry
- id: ask_profile_details_waitlist__wl_profile_details_to_create_pipe
  steps:
  - tool: action-players-create
    'on':
      failed: main.other_query_handler
- id: payment_expired_handler_pipe
  steps:
  - tool: action-slots-release
- id: webhook_booking_confirm_pipe
  steps:
  - tool: action-bookings-confirm
handlers:
- id: payment_expired_handler
  'on': timer.hold_expired
  pipeline: payment_expired_handler_pipe
- id: webhook_booking_confirm
  'on': webhook.payment_captured
  pipeline: webhook_booking_confirm_pipe
interrupts:
- id: global_goodbye
  when: Caller says goodbye, bye, thank you and goodbye, wants to end the call, says they'll connect later,
    or clearly signals they have no further requests
  to: main.call_end
policies:
